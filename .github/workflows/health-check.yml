name: Health Check

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  invoke:
    name: Invoke
    uses: DevExpress/github-actions/.github/workflows/repository-check.yml@repository-check
    with:
      config: |
        {
          ignoredAdvisories: [
            'GHSA-2gmp-34j9-fqjm', // replicator
          ]
        }
